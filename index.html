<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Shlokas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- PWA / Mobile Optimization Meta Tags -->
    <meta name="theme-color" content="#b71c1c">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shlokas">
    <link rel="apple-touch-icon" href="icon.svg">
</head>

<body>
    <div class="settings-wrapper">
        <button id="settings-btn" class="settings-btn" aria-label="Settings">⚙️</button>
        <div id="settings-dropdown" class="settings-dropdown">
            <div class="settings-header">Settings</div>
            <div class="settings-row">
                <span>Dark Mode</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>
    </div>

    <header>
        <h1>Sacred Shlokas</h1>
        <p>A peaceful place to read and reflect</p>
    </header>

    <main>
        <div class="grid">
            <a href="rama/index.html" class="card">
                <div class="card-image"
                    style="background: var(--bg-color); display: flex; align-items: center; justify-content: center; font-size: 80px; border-bottom: 1px solid var(--border-color);">
                    🏹</div>
                <div class="card-content">
                    <h2>Sri Rama</h2>
                    <p>Explore verses dedicated to Lord Rama</p>
                </div>
            </a>
            <!-- Here you can add more gods in the future -->
            <!--
            <a href="shiva/index.html" class="card">
                <div class="card-image" style="background-image: url('...');"></div>
                <div class="card-content">
                    <h2>Lord Shiva</h2>
                    <p>Verses dedicated to Lord Shiva</p>
                </div>
            </a>
            -->
        </div>
    </main>

    <script src="css/theme.js"></script>
</body>

</html>
